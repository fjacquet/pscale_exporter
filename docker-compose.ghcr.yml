# Pull-based test stack: runs the published GHCR image instead of building locally.
#
#   PSCALE1_PASSWORD='your-monitor-password' docker compose -f docker-compose.ghcr.yml up -d
#
# Pin a version with PSCALE_TAG (defaults to :latest):
#   PSCALE_TAG=0.1.0 PSCALE1_PASSWORD='...' docker compose -f docker-compose.ghcr.yml up -d
#
# Refresh images later with:  docker compose -f docker-compose.ghcr.yml pull
#
# Same topology and endpoints as docker-compose.yml; see that file's header for details.
services:
  pscale_exporter:
    image: ghcr.io/fjacquet/pscale_exporter:${PSCALE_TAG:-latest}
    container_name: pscale_exporter
    ports:
      - "2112:2112"
    volumes:
      - ./config.yaml:/etc/pscale_exporter/config.yaml:ro
      - pscale_logs:/var/log/pscale_exporter
    environment:
      - PSCALE1_PASSWORD=${PSCALE1_PASSWORD:-}
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: pscale_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/pscale.rules.yml:/etc/prometheus/pscale.rules.yml:ro
    depends_on:
      - pscale_exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: pscale_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: pscale_otel_collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "8889:8889"
    restart: unless-stopped

volumes:
  pscale_logs:
