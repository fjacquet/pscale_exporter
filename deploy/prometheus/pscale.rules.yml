groups:
  - name: powerscale
    rules:
      # Cluster unreachable: the exporter scraped but the OneFS session/collection failed.
      - alert: PowerScaleClusterDown
        expr: powerscale_up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "PowerScale cluster {{ $labels.cluster }} is unreachable"
          description: "powerscale_up has been 0 for 5m (auth or collection failure)."

      # The exporter itself stopped being scrapeable by Prometheus.
      - alert: PowerScaleExporterDown
        expr: up{job="powerscale"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "pscale_exporter target is down"
          description: "Prometheus cannot scrape the pscale_exporter /metrics endpoint."

      # Capacity headroom warning (used / total). Both series come from ifs.bytes.* keys.
      - alert: PowerScaleClusterCapacityHigh
        expr: |
          (powerscale_cluster_used_capacity_bytes
            / powerscale_cluster_total_capacity_bytes) > 0.85
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "PowerScale cluster {{ $labels.cluster }} above 85% capacity"
          description: "Used capacity is {{ $value | humanizePercentage }} of total."

      # A directory quota is near its hard threshold.
      - alert: PowerScaleQuotaNearHardLimit
        expr: |
          (powerscale_quota_usage_bytes
            / powerscale_quota_hard_threshold_bytes) > 0.9
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Quota {{ $labels.quota_path }} on {{ $labels.cluster }} near hard limit"
          description: "Usage is {{ $value | humanizePercentage }} of the hard quota."

      # A node is smartfailing (drained ahead of removal/replacement).
      - alert: PowerScaleNodeSmartfail
        expr: powerscale_node_smartfail == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ $labels.node }} on {{ $labels.cluster }} is smartfailing"
          description: "powerscale_node_smartfail has been 1 for 5m (node being drained/removed)."

      # A node is mounted read-only (no writes served).
      - alert: PowerScaleNodeReadOnly
        expr: powerscale_node_readonly == 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ $labels.node }} on {{ $labels.cluster }} is read-only"
          description: "powerscale_node_readonly has been 1 for 10m."

      # One or more drives are in a non-healthy state (smartfail/dead/stalled).
      - alert: PowerScaleDriveUnhealthy
        expr: |
          sum by (cluster, node) (
            powerscale_node_drives_total{state=~"SMARTFAIL|DEAD|STALLED|ERASE|GONE"}
          ) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Unhealthy drive(s) on {{ $labels.cluster }} node {{ $labels.node }}"
          description: "{{ $value }} drive(s) in a non-healthy state."

      # A SyncIQ replication policy's last run failed or needs attention (DR risk).
      - alert: PowerScaleSyncIQFailed
        expr: powerscale_synciq_last_run_failed == 1
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "SyncIQ policy {{ $labels.policy }} on {{ $labels.cluster }} last run failed"
          description: "Replication policy is failing / needs attention; DR copy may be stale."

      # OneFS has unresolved critical event-group occurrences.
      - alert: PowerScaleActiveCriticalEvents
        expr: powerscale_active_events{severity="critical"} > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "{{ $value }} unresolved critical event(s) on {{ $labels.cluster }}"
          description: "OneFS reports unresolved critical event-group occurrences."
