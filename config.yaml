---
# PowerScale exporter configuration. One process monitors many OneFS clusters and
# exposes metrics via a Prometheus /metrics endpoint and (optionally) an OTLP push.
server:
  host: "0.0.0.0"
  port: "9444"
  uri: "/metrics"
  logName: "/var/log/pscale_exporter/pscale-exporter.log"

collection:
  interval: "30s"   # OneFS perf samples are ~30s native; capacity changes slowly
  timeout: "20s"

opentelemetry:
  metrics:
    enabled: false
    endpoint: "localhost:4317"
    insecure: true
    interval: "30s"
  tracing:
    enabled: false
    endpoint: "localhost:4317"
    insecure: true
    samplingRate: 0.1

# A read-only (e.g. role with ISI_PRIV_STATISTICS + ISI_PRIV_QUOTA) account is sufficient.
#
# Single-cluster quickstart: endpoint/username/password are driven by PSCALE1_* env vars
# (set them in .env or on the shell). The PSCALE1_ prefix and the `1` are a naming
# convention for exactly one cluster — the compose files pass these through automatically.
#
# Multi-cluster: add one entry per cluster with literal values or your own env refs,
# e.g.:
#   - name: pscale-cluster2
#     endpoint: "${PSCALE2_HOSTNAME}"
#     username: "${PSCALE2_USERNAME}"
#     password: "${PSCALE2_PASSWORD}"
# and pass PSCALE2_* through in compose environment:.
clusters:
  - name: pscale-cluster1
    endpoint: "${PSCALE1_HOSTNAME}"
    port: 8080
    username: "${PSCALE1_USERNAME}"
    password: "${PSCALE1_PASSWORD}"
    # Enable ONLY for clusters with self-signed certs (common in test/lab); keep false in production.
    insecureSkipVerify: false
